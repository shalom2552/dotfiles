format     = '[[$conflicted](fg:red bg:navy)[$deleted](fg:red bg:navy)[$renamed$modified$untracked](fg:gold bg:navy)[$staged](fg:green bg:navy)[$stashed](fg:muted bg:navy)[$ahead_behind](fg:blue bg:navy) ]($style)'
