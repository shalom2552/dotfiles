"$schema" = 'https://starship.rs/config-schema.json'

palette = "tokyo_night"

# в”Җв”Җ Layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
format = """
[оӮ¶](#a3aed2)\
$os\
[оӮҙ](fg:#a3aed2 bg:#769ff0)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$jobs$status$cmd_duration\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ](fg:#1d2230)\
\n$character"""
# palette names work in module styles only, not format inline styles вҖ” hex stays here
# add $username$hostname before $os for remote/SSH awareness
# add $git_state to show REBASING/MERGING inline in git segment

# в”Җв”Җ Colors в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[palettes.tokyo_night]
cap    = "#a3aed2"
blue   = "#769ff0"
navy   = "#394260"
dark   = "#212736"
darker = "#1d2230"

# Text
black  = "#090c0c"
white  = "#e3e5e5"
muted  = "#a0a9cb"
dim    = "#a9b1d6"

# Accents
green  = "#9ece6a"
red    = "#f7768e"
gold   = "#e0af68"

# в”Җв”Җ Config в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[os]
disabled = false
style    = "bg:cap fg:black"
format   = "[ $symbol ]($style)"

[directory]
style                     = "fg:white bg:blue"
format                    = "[ $path]($style)"
truncation_length         = 5
truncation_symbol         = "вҖҰ/"
fish_style_pwd_dir_length = 2
truncate_to_repo          = true
home_symbol               = "у°Ӣң"
read_only                 = "у°Ңҫ"
read_only_style           = "fg:red"
repo_root_style           = "bold fg:white bg:blue"
before_repo_root_style    = "fg:dim bg:blue"
# truncate_to_repo = false вҖ” always show full path from ~


[git_branch]
symbol = "у°ҳ¬"
style  = "bg:navy"
format = '[[ $symbol $branch ](fg:blue bg:navy)]($style)'
truncation_length = 30
truncation_symbol = "вҖҰ"
# only_attached = true  вҖ” hide when in detached HEAD state


[jobs]
# symbol alternatives вҖ” " " "у°’“ " "вҡҷ " "у°Ј– "
symbol           = "у°‘® "
style            = "bg:dark"
format           = '[[ $symbol$number ](fg:gold bg:dark)]($style)'
number_threshold = 2
symbol_threshold = 1

[status]
disabled              = false
symbol                = "у°…ҷ "
# symbol alternatives вҖ” " " "вңҳ " "у°„¬ " "уұ“» "
not_executable_symbol = "уұҺҳ "
not_found_symbol      = "у°Қү "
sigint_symbol         = "у°—ј "
signal_symbol         = "уұҗӢ "
map_symbol            = true
style                 = "bg:dark"
format                = '[[$symbol$common_meaning$signal_name$maybe_int ](fg:red bg:dark)]($style)'
# success_symbol = "у°„¬ "  вҖ” show on clean exit. others: "вң” " " "
# recognize_signal_code = true  вҖ” differentiate signals from plain exit codes
# pipestatus = true             вҖ” show exit code per pipe stage
# pipestatus_format = '[$pipestatus]($style) '

[cmd_duration]
min_time = 2000
style    = "bg:dark"
format   = '[[ уұҺ« $duration ](fg:gold bg:dark)]($style)'

[fill]
symbol = ""
# symbol alternatives вҖ” "в”Җ" (dash) "В·" (dots) "в•җ" (double) "в”Ғ" (bold) "в•Ң" (dashed)
# style = "fg:navy bg:dark"  вҖ” colored separator using git accent

[time]
disabled    = false
time_format = "%R"
# time_format = "%T"      # вҖ” HH:MM:SS
# time_format = "%I:%M %p" # вҖ” 12-hour
# utc_time_offset = "+2" #   вҖ” force timezone offset
style       = "bg:darker"
format      = '[[ уұ‘’ $time ](fg:muted bg:darker)]($style)'

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol   = "[вқҜ](bold red)"
# success_symbol alternatives вҖ” "вқҜ" "вһң" "в–¶" "О»" "В»" "вҖә" "$" " " "у°„ҫ " "вқұ"

# в”Җв”Җ Optional modules в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

# System

# [memory_usage]    shows RAM %. useful to watch during heavy builds
# disabled  = false
# threshold = 70
# symbol    = "у°Қӣ "
# format    = "[$symbol${ram_pct} ]($style)"
# style     = "fg:red"

# [battery]         silent on desktop (no battery = never shows). useful on laptops
# disabled = true
# [[battery.display]]
# threshold = 20
# style = "bold fg:red"

# Remote / SSH

# [username]        shows user@host. useful on SSH or shared machines
# show_always = false

# [hostname]
# ssh_only = true
# format   = "[$hostname ]($style)"
# style    = "fg:muted"

# [container]       shows when inside docker / podman / lxc / nspawn
# disabled = true

# [shell]           shows which shell you're in (zsh / bash / fish)
# disabled = true

# Git extras

# [git_commit]      shows current commit hash at prompt
# commit_hash_length = 7
# tag_symbol = "у°“ј "

# [git_metrics]     shows +N/-N lines changed since last commit
# disabled = true

# [git_state]       shows REBASING / MERGING / CHERRY-PICKING вҖ” on by default
# disabled = false
# format = '[\($state( $progress_current/$progress_total)\)]($style) '

# в”Җв”Җ Constants в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
