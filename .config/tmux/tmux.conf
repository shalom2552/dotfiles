# ==========================
# Core Settings
# ==========================
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',xterm-256color:RGB'
set -sa terminal-overrides ",xterm*:kHome=\e[H:kEnd=\e[F"

set -g prefix ^A
set -g mouse on                 # enable mouse
set -g base-index 1             # start indexing windows at 1
set -g pane-base-index 1        # start indexing panes at 1
set -g detach-on-destroy on     # exit from tmux when closing a session
set -g escape-time 0            # zero-out escape time delay
set -g focus-events on          # let vim/neovim detect focus
set -g history-limit 1000000    # increase history size
set -g renumber-windows on      # renumber all windows when any window is closed
set -g set-clipboard on         # use system clipboard
set -g display-time 1000        # message display time
setw -g mode-keys vi            # vim keys in text select mode (prefix + [)


# ==========================
# Keybindings
# ==========================
# Tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux reloaded"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Vi copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane switching (Ctrl + h/j/k/l) — vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Pane switching (Ctrl + Arrows) — fallback
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R

# Window switching (Alt + Shift + h/l / Arrows)
bind -n C-S-h previous-window
bind -n C-S-l next-window
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window

# Terminal
bind C-l send-keys 'C-l'  # restore clear screen
bind C-a send-keys 'C-a'  # send C-a (line start) to terminal


# ==========================
# UI & Status Bar
# ==========================
set -g message-style bg=default,fg=default          # transparent command line
set -g message-command-style bg=default,fg=default  # transparent vi command mode
set -g status-position top
set -g status-interval 5            # update the status-bar every 5 seconds
set -g status-style bg=default      # Transparent status-bar background
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-separator ""   # tighten default gap between left icons

# Floating Pill Design (Left: Session)
set -g status-left "  #[fg=blue,bg=default]#[fg=black,bg=blue,bold] #S#[fg=blue,bg=default] "

# Floating Pill Design (Middle: Windows)
set -g window-status-format "#[fg=brightblack,bg=default]#[fg=white,bg=brightblack]#I #W#[fg=brightblack,bg=default] "
set -g window-status-current-format "#[fg=magenta,bg=default]#[fg=black,bg=magenta,bold]#I #W#{?window_zoomed_flag, ,}#[fg=magenta,bg=default] "

# Floating Pill Design (Right: Git, Directory, Time)
set -g status-right " #(cd #{pane_current_path} && git rev-parse --show-toplevel >/dev/null 2>&1 && echo '#[fg=magenta,bg=default]#[fg=black,bg=magenta,bold] '$(basename $(git rev-parse --show-toplevel)):$(git branch --show-current)'#[fg=magenta,bg=default]')"
set -ga status-right " #[fg=cyan,bg=default]#[fg=black,bg=cyan,bold] #{b:pane_current_path}#[fg=cyan,bg=default]"
set -ga status-right " #[fg=green,bg=default]#[fg=black,bg=green,bold]󰃰 %H:%M#[fg=green,bg=default] "


# ==========================
# Plugins
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Prefix + Ctrl-S to save, Prefix + Ctrl-R to load
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# SessionX
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-additional-options "--color pointer:9,spinner:92,marker:46 --margin 0,0"

run '~/.config/tmux/plugins/tpm/tpm'
